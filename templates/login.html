<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 校园数据平台</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 40px 50px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 320px;
            text-align: center;
        }
        .login-card h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
        }
        .login-card p {
            color: #86868b;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.2s;
            background-color: #fafafa;
        }
        .input-group input:focus {
            border-color: #0071e3;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #0071e3;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-btn:hover {
            background-color: #0077ed;
        }
        .login-btn:disabled {
            background-color: #a1a1a6;
            cursor: not-allowed;
        }
        #error-msg {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 15px;
            min-height: 18px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>登录</h1>
        <p>请输入您的教职工凭证</p>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" id="username" placeholder="用户名" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="submitBtn">登录系统</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('error-msg');
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = "验证中...";
            errorMsg.innerText = "";

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
            .then(res => res.json().then(data => ({ status: res.status, body: data })))
            .then(obj => {
                if (obj.status === 200) {
                    btn.innerText = "登录成功，跳转中...";
                    
                    // 【核心修改】：解析 URL 中的 next 参数实现智能跳转
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get('next');
                    
                    // 简单的安全校验：确保 nextUrl 是以 '/' 开头的相对路径，防止被恶意跳转到站外
                    if (nextUrl && nextUrl.startsWith('/')) {
                        window.location.href = nextUrl;
                    } else {
                        window.location.href = '/'; // 默认回到首页
                    }
                } else {
                    btn.disabled = false;
                    btn.innerText = "登录系统";
                    errorMsg.innerText = obj.body.message || "登录失败，请检查网络";
                }
            })
            .catch(err => {
                btn.disabled = false;
                btn.innerText = "登录系统";
                errorMsg.innerText = "网络请求异常";
            });
        }
    </script>
</body>
</html>

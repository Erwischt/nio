<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}校园数据平台{% endblock %}</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --text-secondary: #86868b;
            --apple-blue: #0071e3;
            --apple-red: #ff3b30;
            --border-radius: 14px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; padding-top: 60px; }
        
        .global-nav { position: fixed; top: 0; left: 0; right: 0; height: 54px; background: rgba(255, 255, 255, 0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; border-bottom: 1px solid rgba(0, 0, 0, 0.08); z-index: 1000; }
        .nav-brand { font-size: 18px; font-weight: 600; color: var(--text-main); text-decoration: none; letter-spacing: -0.5px; }
        .nav-user { display: flex; align-items: center; gap: 20px; font-size: 14px; }
        
        .user-greeting { color: var(--text-secondary); }
        .user-name { font-weight: 600; color: var(--text-main); }
        .logout-btn { color: var(--apple-red); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .logout-btn:hover { opacity: 0.7; }
        .login-nav-btn { color: var(--apple-blue); text-decoration: none; font-weight: 600; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="global-nav">
        <a href="/" class="nav-brand"> 校园数据平台</a>
        <div class="nav-user">
            {% if session.get('uid') %}
                <span class="user-greeting">欢迎，<span class="user-name">{{ session.get('real_name') }}</span></span>
                <a href="/logout" class="logout-btn">退出登录</a>
            {% else %}
                <a href="/login" class="login-nav-btn">教职工登录 ➔</a>
            {% endif %}
        </div>
    </nav>

    {% block content %}{% endblock %}
</body>
</html>
